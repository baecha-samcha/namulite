services:
  mariadb:
    image: mariadb:11.4
    container_name: namulite-mariadb
    restart: unless-stopped
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
      MARIADB_DATABASE: ${DB_NAME:-namulite}
      MARIADB_USER: ${DB_USER:-namulite_app}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - namulite_mariadb_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  namulite_mariadb_data:
