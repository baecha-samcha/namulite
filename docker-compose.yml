services:
  mysql:
    image: mysql:8.4
    container_name: wikindle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: wikindle_dev_password
      MYSQL_DATABASE: wikindle
    ports:
      - "3306:3306"
    volumes:
      - wikindle_mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  wikindle_mysql_data: